name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Checkout plugin-sdk
      uses: actions/checkout@v4
      with:
        repository: DK22Pac/plugin-sdk
        path: plugin-sdk

    - name: Get plugin-sdk hash
      id: plugin-sdk-hash
      shell: pwsh
      run: echo "hash=$(git -C plugin-sdk rev-parse HEAD)" >> $env:GITHUB_OUTPUT

    - name: Cache plugin-sdk
      id: cache-plugin-sdk
      uses: actions/cache@v4
      with:
        path: plugin-sdk
        key: plugin-sdk-${{ runner.os }}-${{ steps.plugin-sdk-hash.outputs.hash }}

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Generate plugin-sdk solution
      if: steps.cache-plugin-sdk.outputs.cache-hit != 'true'
      shell: cmd
      env:
        PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk
      run: |
        cd plugin-sdk\tools\premake
        premake5.exe vs2022

    - name: Build plugin-sdk
      if: steps.cache-plugin-sdk.outputs.cache-hit != 'true'
      shell: cmd
      env:
        PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk
      run: msbuild plugin-sdk\plugin.sln /p:Configuration="Release"

    - name: Copy Soundize
      shell: cmd
      run: xcopy VehFuncs\Soundize Soundize\Soundize /E /I

    - name: Build VehFuncs
      shell: cmd
      env:
        PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk
      run: msbuild VehFuncs\VehFuncs.vcxproj /p:Configuration="GTASA Release" /p:Platform="Win32" /p:SolutionDir="${{ github.workspace }}\" /p:OutDir="${{ github.workspace }}\bin\\"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VehFuncs.asi
        path: bin/VehFuncs.asi
